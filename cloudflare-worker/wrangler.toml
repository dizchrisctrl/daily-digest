name            = "daily-digest-proxy"
main            = "index.js"
compatibility_date = "2024-09-23"

# ── KV namespace for rate limiting ──────────────────────────────────────────
# Run this once to create the namespace:
#   wrangler kv namespace create RATE_LIMIT
# Then paste the returned `id` value below and run `wrangler deploy`.
[[kv_namespaces]]
binding = "RATE_LIMIT"
id      = "PASTE_YOUR_KV_NAMESPACE_ID_HERE"

# ── Secrets (set via wrangler, not stored here) ──────────────────────────────
#   wrangler secret put ANTHROPIC_API_KEY
