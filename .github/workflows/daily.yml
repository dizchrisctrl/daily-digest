name: Daily Digest

on:
  schedule:
    - cron: '0 12 * * *'   # 7:00 AM EST / 8:00 AM EDT every day
  workflow_dispatch:        # also allows manual trigger from GitHub UI
    inputs:
      rebuild_only:
        description: 'Rebuild HTML from existing data (no Claude calls, no email)'
        type: boolean
        default: false

permissions:
  contents: write   # needed to push to gh-pages branch
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Checkout gh-pages data
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: output
        continue-on-error: true   # first run has no gh-pages yet

      - name: Generate digest
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS:        ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_CLIENT_ID:      ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET:  ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN:  ${{ secrets.GMAIL_REFRESH_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.rebuild_only }}" = "true" ]; then
            python generate_digest.py --rebuild
          else
            python generate_digest.py
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@e9c66a37f080288a11235e32cbe2dc5fb3a679cc  # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir:  ./output
          publish_branch: gh-pages
          commit_message: "digest: ${{ env.TODAY }}"
